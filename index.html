<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام المبيعات</title>
<style>
body{
    font-family:Arial;
    direction:rtl;
    background:#f2f2f2;
}
.page{
    display:none;
    width:350px;
    margin:40px auto;
    padding:20px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 0 10px #999;
}
.page.active{
    display:block;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
}
table,th,td{
    border:1px solid #000;
}
th,td{
    padding:8px;
}
</style>
</head>
<body>

<!-- تسجيل الدخول -->
<div id="login" class="page active">
<h2>تسجيل الدخول</h2>

<input type="text" placeholder="اسم المستخدم">
<input type="password" placeholder="كلمة المرور">

<button onclick="showPage('dashboard')">دخول</button>
<button onclick="showPage('register')">إنشاء حساب</button>
</div>

<!-- إنشاء حساب -->
<div id="register" class="page">
<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم">
<input type="email" placeholder="البريد الإلكتروني">
<input type="password" placeholder="كلمة المرور">

<button onclick="showPage('dashboard')">حفظ الحساب</button>
<button onclick="showPage('login')">رجوع</button>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" class="page">
<h2>لوحة التحكم</h2>

<button onclick="showPage('sales')">المبيعات</button>
<button>المنتجات</button>
<button>العملاء</button>
<button onclick="showPage('login')">تسجيل الخروج</button>
</div>

<!-- شاشة المبيعات -->
<div id="sales" class="page">
<h2>شاشة المبيعات</h2>

<input type="text" placeholder="اسم المنتج">
<input type="number" placeholder="الكمية">
<input type="number" placeholder="السعر">

<button>إضافة</button>

<table>
<tr>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
</tr>
</table>

<button onclick="showPage('dashboard')">رجوع للوحة التحكم</button>
</div>

<script>
function showPage(pageId){
    var pages=document.getElementsByClassName("page");
    for(var i=0;i<pages.length;i++){
        pages[i].classList.remove("active");
    }
    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
